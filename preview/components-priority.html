<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.chip { display:inline-flex; align-items:center; gap:6px; padding:4px 10px; border-radius:9999px; font-size:12px; font-weight:500; user-select:none; }
.high { background:#fff1f2; color:#e11d48; }
.med { background:#fffbeb; color:#d97706; }
.low { background:#ecfdf5; color:#059669; }
.dot { width:6px; height:6px; border-radius:50%; }
.d-h{background:#f43f5e} .d-m{background:#f59e0b} .d-l{background:#10b981}
.micro { font-family:Geist Mono,monospace; font-size:10px; color:#6e747c; margin-top:10px; }
</style></head><body><div class="card">
<div class="row" style="gap:12px">
  <span class="chip high"><span class="dot d-h"></span>High Priority</span>
  <span class="chip med"><span class="dot d-m"></span>Medium Priority</span>
  <span class="chip low"><span class="dot d-l"></span>Low Priority</span>
</div>
<div class="micro">Strategy rule priority · rose-500 / amber-500 / emerald-500</div>
</div></body></html>
