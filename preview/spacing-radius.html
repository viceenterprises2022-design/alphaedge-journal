<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.radius-item { display:flex; flex-direction:column; align-items:center; gap:6px; flex:1; }
.r-box { width:72px; height:72px; background:#fff; border:1px solid #e4e4e7; box-shadow: 0 1px 2px rgba(0,0,0,0.06), 0 1px 3px rgba(0,0,0,0.06); }
.rlabel { font-family:"Geist Mono",monospace; font-size:10px; color:#6e747c; }
</style></head><body><div class="card">
<div class="row" style="gap:12px; justify-content:space-between">
  <div class="radius-item"><div class="r-box" style="border-radius:4px"></div><div class="rlabel">sm · 4</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:6px"></div><div class="rlabel">md · 6</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:8px"></div><div class="rlabel">lg · 8</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:12px"></div><div class="rlabel">xl · 12</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:16px"></div><div class="rlabel">2xl · 16</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:24px"></div><div class="rlabel">3xl · 24</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:40px"></div><div class="rlabel">40 · CTA</div></div>
  <div class="radius-item"><div class="r-box" style="border-radius:9999px"></div><div class="rlabel">pill</div></div>
</div>
</div></body></html>
