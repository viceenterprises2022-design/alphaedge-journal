<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.sh { flex:1; display:flex; flex-direction:column; align-items:center; gap:10px; padding:12px 0; }
.swatch { width:120px; height:60px; background:#fff; border-radius:10px; }
.s-label { font-family:"Geist Mono",monospace; font-size:10px; color:#6e747c; text-align:center; }
.dark { background:rgb(58,53,50) !important; }
.btn-black { box-shadow: rgba(45,32,17,0.12) 0 0.5px 0.5px 0, rgba(45,32,17,0.24) 0 1px 2px 0, rgba(45,32,17,0.32) 0 2px 4px 0, rgba(45,32,17,0.4) 0 6px 12px -3px, #000 0 -0.2px 0 0 inset; }
.btn-white { box-shadow: 0 0 0 1px #efede8, 0 1px 2px #b2aa9e52, 0 3px 3px #d1cdc73d, 0 -2px #f0f0efb3 inset; }
.cal { box-shadow: rgba(30,45,82,0.06) 0 0 0.4px 0.4px, rgba(30,45,82,0.2) 0.4px 0.4px 0.4px 0; }
.card-md { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
</style></head><body><div class="card" style="background:#f4f1ee">
<div class="row" style="gap:10px; align-items:stretch">
  <div class="sh"><div class="swatch btn-black dark"></div><div class="s-label">.button-shadow<br/>(ink, warm)</div></div>
  <div class="sh"><div class="swatch btn-white"></div><div class="s-label">.button-shadow-white<br/>(paper, embossed)</div></div>
  <div class="sh"><div class="swatch cal"></div><div class="s-label">.calendar-banner-shadow<br/>(hairline edge)</div></div>
  <div class="sh"><div class="swatch card-md"></div><div class="s-label">shadow-md<br/>(cards, nav)</div></div>
</div>
</div></body></html>
