<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
.sw { display:flex; flex-direction:column; gap:6px; flex:1; }
.chip { height:64px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); }
.meta { display:flex; justify-content:space-between; font-size:11px; }
.name { color:#3d3929; font-weight:500; }
</style></head><body><div class="card">
<div class="row" style="gap:10px">
  <div class="sw"><div class="chip" style="background:#fbfaf9"></div><div class="meta"><span class="name">--primary</span><span class="hex">#fbfaf9</span></div></div>
  <div class="sw"><div class="chip" style="background:#f4f1ee"></div><div class="meta"><span class="name">--secondary</span><span class="hex">#f4f1ee</span></div></div>
  <div class="sw"><div class="chip" style="background:#e8e7e5"></div><div class="meta"><span class="name">--darkPrimary</span><span class="hex">#e8e7e5</span></div></div>
  <div class="sw"><div class="chip" style="background:#6e747c"></div><div class="meta"><span class="name">--tertiary</span><span class="hex">#6e747c</span></div></div>
  <div class="sw"><div class="chip" style="background:#3d3929"></div><div class="meta"><span class="name">ink</span><span class="hex">#3d3929</span></div></div>
  <div class="sw"><div class="chip" style="background:#1a1a1a"></div><div class="meta"><span class="name">ink-deep</span><span class="hex">#1a1a1a</span></div></div>
</div>
</div></body></html>
