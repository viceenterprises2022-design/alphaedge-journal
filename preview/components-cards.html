<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.card-a { background:#fff; border:1px solid #e4e4e7; border-radius:12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.08), 0 2px 4px -2px rgb(0 0 0 / 0.08); padding:14px; flex:1; }
.card-b { background:#f4f1ee; border-radius:12px; padding:14px; flex:1; }
.card-c { background:#1a1a1a; color:#fff; border-radius:40px; padding:16px 22px; flex:1.2; position:relative; overflow:hidden; }
.c-title { font-weight:600; font-size:14px; color:#3d3929; margin-bottom:6px; }
.c-body { font-size:12px; color:#6e747c; line-height:1.5; }
.cta-title { font-weight:700; font-size:16px; }
.cta-sub { opacity:0.7; font-size:11px; margin-top:4px; }
</style></head><body><div class="card">
<div class="row" style="gap:10px; align-items:stretch">
  <div class="card-a">
    <div class="c-title">Review card</div>
    <div class="c-body">bg-white · rounded-xl · border zinc-200</div>
  </div>
  <div class="card-b">
    <div class="c-title">Parallax frame</div>
    <div class="c-body">bg-secondary · paper feel · soft</div>
  </div>
  <div class="card-c">
    <div class="cta-title">Join thousands of smart traders.</div>
    <div class="cta-sub">rounded-[2.5rem] · ink-deep · brand signature</div>
  </div>
</div>
</div></body></html>
