<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.sw-wrap { display:flex; flex-direction:column; align-items:center; gap:10px; flex:1; }
.sw-btn { border-radius:4px; background:hsl(38,22%,94%); width:64px; height:32px; position:relative; cursor:pointer; transition: box-shadow .45s cubic-bezier(.6,.6,0,1); box-shadow: 0 0 0 1px #70451a3d, 0 1px 2px #70451a0d, 2px 3px 5px #70451a29, 4px 6px 5px #70451a14, 8px 12px 8px #70451a14, 8px 0 0.5px #70451a33 inset, 10px 0 4px -6px #70451a33 inset; }
.sw-btn::before { content:""; position:absolute; top:0; left:0; width:56px; height:32px; border-radius:4px; transform: translate(8px); background: linear-gradient(270deg, #ebe7e0 0%, #ebe7e0 49.89%, #fbfaf9 53.59%), #fbfaf9; box-shadow:-1px 1px 1px #ffffff52 inset; }
.sw-btn.active::before { transform: translate(0); background: linear-gradient(90deg, #ebe7e0 0%, #ebe7e0 49.89%, #fbfaf9 53.59%), #fbfaf9; }
.chk { width:18px; height:18px; border:1px solid #d4d4d8; border-radius:4px; background:#fff; }
.chk.on { background:#18181b; border-color:#18181b; position:relative; }
.chk.on::after { content:""; position:absolute; left:5px; top:2px; width:5px; height:9px; border:2px solid #fff; border-top:0; border-left:0; transform:rotate(45deg); }
.input { border:1px solid #e4e4e7; border-radius:6px; padding:8px 12px; width:100%; background:#fff; font-size:13px; color:#3d3929; box-shadow: 0 1px 2px rgba(0,0,0,0.04); }
.lab { font-family:Geist Mono, monospace; font-size:10px; color:#6e747c; }
</style></head><body><div class="card">
<div class="row" style="gap:18px; align-items:flex-end">
  <div class="sw-wrap"><div class="sw-btn"></div><div class="lab">switch · off</div></div>
  <div class="sw-wrap"><div class="sw-btn active"></div><div class="lab">switch · on</div></div>
  <div class="sw-wrap"><div class="chk"></div><div class="lab">checkbox</div></div>
  <div class="sw-wrap"><div class="chk on"></div><div class="lab">checked</div></div>
  <div style="flex:2.2; display:flex; flex-direction:column; gap:6px">
    <div class="lab">input · shadcn</div>
    <input class="input" value="AAPL" />
  </div>
</div>
</div></body></html>
