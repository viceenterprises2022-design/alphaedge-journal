<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet"><style>
.sw { display:flex; flex-direction:column; gap:6px; flex:1; }
.chip { height:64px; border-radius:10px; border:1px solid rgba(0,0,0,0.06); }
.meta { display:flex; justify-content:space-between; font-size:11px; }
.name { color:#3d3929; font-weight:500; }
</style></head><body><div class="card">
<div class="row" style="gap:10px; align-items:stretch">
  <div class="sw" style="flex:1.4">
    <div class="chip" style="background:#da7756; display:flex; align-items:center; justify-content:center; color:#fff; font-family:Geist Mono,monospace; font-size:18px; letter-spacing:0.08em">CLAUDE</div>
    <div class="meta"><span class="name">--claude</span><span class="hex">#da7756</span></div>
  </div>
  <div class="sw"><div class="chip" style="background:rgba(218,119,86,0.1)"></div><div class="meta"><span class="name">claudeBg</span><span class="hex">10%</span></div></div>
  <div class="sw"><div class="chip" style="background:#76b562"></div><div class="meta"><span class="name">--buy</span><span class="hex">#76b562</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(118,181,98,0.4)"></div><div class="meta"><span class="name">buyOpacity</span><span class="hex">40%</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(118,181,98,0.2)"></div><div class="meta"><span class="name">buyLight</span><span class="hex">20%</span></div></div>
</div>
<div class="row" style="gap:10px; margin-top:10px; align-items:stretch">
  <div class="sw"><div class="chip" style="background:#e96a5e"></div><div class="meta"><span class="name">--sell</span><span class="hex">#e96a5e</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(233,106,94,0.4)"></div><div class="meta"><span class="name">sellOpacity</span><span class="hex">40%</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(233,106,94,0.2)"></div><div class="meta"><span class="name">sellLight</span><span class="hex">20%</span></div></div>
  <div class="sw"><div class="chip" style="background:#9999ff"></div><div class="meta"><span class="name">customBlue</span><span class="hex">#9999ff</span></div></div>
  <div class="sw"><div class="chip" style="background:#e16540"></div><div class="meta"><span class="name">customOrange</span><span class="hex">#e16540</span></div></div>
  <div class="sw"><div class="chip" style="background:#fac666"></div><div class="meta"><span class="name">customYellow</span><span class="hex">#fac666</span></div></div>
</div>
</div></body></html>
