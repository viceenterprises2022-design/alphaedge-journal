<!DOCTYPE html><html><head><meta charset="utf-8"><link rel="stylesheet" href="card-base.css"><style>
.btn { display:inline-flex; align-items:center; gap:8px; padding:10px 18px; border-radius:10px; font-size:14px; cursor:pointer; }
.btn-black { background:rgb(58,53,50); color:#fbfaf9; border:0; box-shadow: rgba(45,32,17,0.12) 0 0.5px 0.5px 0, rgba(45,32,17,0.24) 0 1px 2px 0, rgba(45,32,17,0.32) 0 2px 4px 0, rgba(45,32,17,0.4) 0 6px 12px -3px, #000 0 -0.2px 0 0 inset; }
.btn-white { background:#fff; color:#4a4340; border:1px solid #e4e4e7; box-shadow: 0 0 0 1px #efede8, 0 1px 2px #b2aa9e52, 0 3px 3px #d1cdc73d, 0 -2px #f0f0efb3 inset; }
.pill { background:#fbfaf9; border:1px solid #e4e4e7; padding:4px 10px; border-radius:6px; font-size:11px; box-shadow: 0 1px 2px rgba(0,0,0,0.06); }
.trust { display:inline-flex; align-items:center; gap:8px; border:0.25px solid #d4d4d8; padding:6px 14px; border-radius:9999px; font-size:12px; color:#71717a; }
</style></head><body><div class="card">
<div class="row" style="gap:14px; flex-wrap:wrap">
  <button class="btn btn-black">Get started — for free</button>
  <button class="btn btn-white">Log in</button>
  <span class="pill">Charts</span>
  <span class="pill">Calendar</span>
  <span class="trust"><span style="display:inline-flex; width:8px; height:8px; border-radius:50%; background:#22c55e"></span>Trusted by over 1,000 traders</span>
</div>
</div></body></html>
