<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>AlphaEdge Journal — Marketing kit</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      colors: {
        primary: '#fbfaf9',
        darkPrimary: '#e8e7e5',
        secondary: '#f4f1ee',
        tertiary: '#6e747c',
        claude: '#da7756',
        claudeBackground: 'rgba(218,119,86,0.1)',
        buy: '#76b562',
        buyOpacity: 'rgba(118,181,98,0.4)',
        buyLight: 'rgba(118,181,98,0.2)',
        sell: '#e96a5e',
        sellOpacity: 'rgba(233,106,94,0.4)',
        sellLight: 'rgba(233,106,94,0.2)',
        customBlue: '#9999ff',
        customOrange: '#e16540',
        customYellow: '#fac666',
      }
    }
  }
}
</script>
<style>
  html, body { font-family: Arial, Helvetica, sans-serif; color: #3d3929; background: #fbfaf9; font-size: 14px; }
  .font-display { font-family: "Geist", Arial, sans-serif; }
  .font-mono-display { font-family: "Geist Mono", ui-monospace, monospace; font-variant-numeric: tabular-nums; }
  p { font-size: 0.8rem; }
  .main-text {
    background: linear-gradient(to bottom right, #27272a, #52525b, #09090b);
    -webkit-background-clip: text; background-clip: text; color: transparent;
    font-weight: 700; font-family: "Geist", Arial, sans-serif; letter-spacing: -0.015em;
  }
  .button-shadow { background-color: rgb(58, 53, 50); box-shadow: rgba(45,32,17,0.12) 0 0.5px 0.5px 0, rgba(45,32,17,0.24) 0 1px 2px 0, rgba(45,32,17,0.32) 0 2px 4px 0, rgba(45,32,17,0.4) 0 6px 12px -3px, #000 0 -0.2px 0 0 inset; cursor:pointer; }
  .button-shadow-white { background-color: #fff; box-shadow: 0 0 0 1px #efede8, 0 1px 2px #b2aa9e52, 0 3px 3px #d1cdc73d, 0 -2px #f0f0efb3 inset; cursor:pointer; }
  .button-shadow:hover { background-color: #4c4746; box-shadow: 0 0.5px 0.5px #2d20111f, 0 1px 2px #2d20113d, 0 2px 4px #2d201152, 0 6px 12px -3px #2d201166, 0 -0.2px #000 inset; }
  .button-shadow-white:hover { background-color: var(--primary); box-shadow: 0 1px 1px #efede8, 0 1.5px 3px #b2aa9e52, 0 4px 8px #d1cdc73d, 0 12px 24px -6px #f0f0efb3, 0 -2px #e0e0e0 inset; }
  .mobile-navbar-shadow { box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1); }
  .fading-gradient { position:absolute; inset:0; pointer-events:none; z-index:9999; background: linear-gradient(to right, rgba(255,255,255,1) 12%, rgba(255,255,255,0.15) 25%, rgba(255,255,255,0) 50%, rgba(255,255,255,0.15) 75%, rgba(255,255,255,1) 88%); }
  @keyframes slideRight { from { transform: translateX(-6rem); } to { transform: translateX(6rem); } }
  @keyframes slideLeft { from { transform: translateX(6rem); } to { transform: translateX(-6rem); } }
  .animate-slide-right { animation: slideRight 36s ease-in-out infinite alternate; }
  .animate-slide-left { animation: slideLeft 36s ease-in-out infinite alternate; }
  .gradient { background: linear-gradient(180deg, rgba(49,45,43,0.95) 0%, rgba(32,30,29,0.95) 100%), #000; }
  .switch-btn { border-radius:4px; background:hsl(38,22%,94%); width:64px; height:32px; position:relative; cursor:pointer; transition: box-shadow .45s cubic-bezier(.6,.6,0,1); box-shadow: 0 0 0 1px #70451a3d, 0 1px 2px #70451a0d, 2px 3px 5px #70451a29, 4px 6px 5px #70451a14, 8px 12px 8px #70451a14, 8px 0 0.5px #70451a33 inset, 10px 0 4px -6px #70451a33 inset; }
  .switch-btn::before { content:""; position:absolute; top:0; left:0; width:56px; height:32px; border-radius:4px; transform: translate(8px); background: linear-gradient(270deg, #ebe7e0 0%, #ebe7e0 49.89%, #fbfaf9 53.59%), #fbfaf9; box-shadow:-1px 1px 1px #ffffff52 inset; transition: transform .45s cubic-bezier(.6,.6,0,1); }
  .switch-btn.active::before { transform: translate(0); background: linear-gradient(90deg, #ebe7e0 0%, #ebe7e0 49.89%, #fbfaf9 53.59%), #fbfaf9; }
  /* Hero paper pattern */
  .paper-band {
    background-image: repeating-linear-gradient(90deg, rgba(153,153,255,0.05) 0 60px, rgba(250,198,102,0.05) 60px 120px, rgba(225,101,64,0.05) 120px 180px, rgba(118,181,98,0.05) 180px 240px);
  }
  .pixi-canvas { position:absolute; inset:0; pointer-events:none; }
  .nav-link { padding: 10px 18px; border-radius: 8px; cursor:pointer; color:#3d3929; }
  .nav-link:hover { background:#e8e7e5; }
  .eyebrow { display:inline-block; border:1px solid #e4e4e7; padding:4px 10px; border-radius:6px; font-size:12px; background:#fff; box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
</style>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pixi.js/7.4.0/pixi.min.js"></script>
</head>

<script type="text/babel" src="./Icons.jsx"></script>

<script type="text/babel" src="./Hero.jsx"></script>

<script type="text/babel" src="./SummarySection.jsx"></script>
<script type="text/babel" src="./AISection.jsx"></script>
<script type="text/babel" src="./CalendarSection.jsx"></script>
<script type="text/babel" src="./JournalSection.jsx"></script>
<script type="text/babel" src="./ReviewsSection.jsx"></script>

</body>
</html>
